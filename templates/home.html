<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فروشگاه من | Chichi Store</title>
    <style>
        /* استایل‌های پایه */
        body {
            font-family: 'Tahoma', sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            color: #333;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 1rem;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* استایل لیست محصولات */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        /* استایل کارت محصول */
        .product-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background-color: #eee;
        }

        .product-info {
            padding: 15px;
        }

        .product-name {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #2c3e50;
        }

        .product-price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1rem;
        }

        /* پیام زمانی که محصولی نیست */
        .no-products {
            text-align: center;
            font-size: 1.5rem;
            color: #7f8c8d;
            margin-top: 50px;
        }

        /* دکمه خرید (نمایشی) */
        .buy-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background-color: #27ae60;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <header>
        <h1>فروشگاه آنلاین من</h1>
    </header>

    <div class="container">
        {% if products %}
            <div class="product-grid">
                {% for product in products %}
                    <div class="product-card">
                        <!-- نمایش تصویر محصول -->
                        {% if product.image %}
                            <img src="{{ product.image.url }}" alt="{{ product.name }}" class="product-image">
                        {% else %}
                            <div class="product-image" style="display: flex; align-items: center; justify-content: center; color: #ccc;">
                                تصویر ندارد
                            </div>
                        {% endif %}

                        <div class="product-info">
                            <h2 class="product-name">{{ product.name }}</h2>
                            <p class="product-price">{{ product.price }} تومان</p>
                            <a href="#" class="buy-btn">افزودن به سبد</a>
                        </div>
                    </div>
                {% endfor %}
            </div>
        {% else %}
            <p class="no-products">هنوز محصولی در فروشگاه اضافه نشده است. 🛒</p>
        {% endif %}
    </div>

</body>
</html>
